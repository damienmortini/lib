nodeLinker: hoisted
linkWorkspacePackages: true
packages:
  - "packages/**"
allowBuilds:
  esbuild: true
  # nx persists only as a transitive dependency of lerna (used internally for its
  # project graph); we no longer use nx for build orchestration (build = pnpm -r).
  nx: true
# Force patched versions of vulnerable transitive dependencies (Dependabot
# alerts) that parents' pinned ranges would otherwise hold back.
overrides:
  'js-yaml@>=4.0.0 <4.2.0': '4.2.0'
  'form-data@>=4.0.0 <4.0.6': '4.0.6'
  'tar@>=7.0.0 <7.5.16': '7.5.16'
  'tmp@0.2.6': '0.2.7'
